name: 背书系统安全检查

on:
  pull_request:
  push:
    branches: [agent/secure-teacher-auth]

permissions:
  contents: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
